server:
  port: 8081

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:bankdb}
    username: ${DB_USERNAME:bankuser}
    password: ${DB_PASSWORD:bankpass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enabled: true
            required: true
        from: ${MAIL_FROM:noreply@javabank.com}

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production}
    expiration-ms: ${JWT_EXPIRATION:86400000}  # 24 hours

logging:
  level:
    com.javabank: DEBUG
    org.springframework.security: DEBUG
