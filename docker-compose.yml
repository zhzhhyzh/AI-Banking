version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: javabank-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-bankdb}
      POSTGRES_USER: ${DB_USERNAME:-bankuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bankpass}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-bankuser} -d ${DB_NAME:-bankdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: javabank-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
